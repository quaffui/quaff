<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="">
    <script type="module">
      // prevents a white flash on load for dark mode users
      const savedDisplayMode = localStorage.getItem("displayMode");
      let currentDisplayMode;

      if (savedDisplayMode === "dark" || savedDisplayMode === "light") {
        currentDisplayMode = savedDisplayMode;
      } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
        currentDisplayMode = "dark";
      } else {
        currentDisplayMode = "light";
      }

      document.body.classList.add(`body--${currentDisplayMode}`);
    </script>

    <div>%sveltekit.body%</div>
  </body>
</html>
