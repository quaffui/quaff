name: Publish Package to npmjs
on:
  workflow_dispatch:
    inputs:
      version:
        description: "version (e.g. 1.2.3)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Set package version
        run: bun scripts/setPublishVersion.ts "${{ github.event.inputs.version }}"

      - name: Build package
        run: bun run build

      - name: Publish to npm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > .npmrc
          bun publish --access public --ignore-scripts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          gh release create "$VERSION" \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --generate-notes

  generated-project-e2e:
    needs: publish
    uses: quaffui/quaff-shared/.github/workflows/generated-project-e2e.yml@main
    with:
      package-under-test: published

  deploy-docs:
    needs: generated-project-e2e
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      version: ${{ inputs.version }}
