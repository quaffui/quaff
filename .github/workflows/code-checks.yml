name: Code Checks

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  run-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Generate docs
        run: |
          bun run gen:plugins
          bun run docgen-props
          bun run docgen-snippets

      - name: Run Type Check
        run: bun run check

      - name: Run Lint
        run: bun run lint
